<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@owlbear-rodeo/sdk"></script>
    <style>
        body { background: #202124; color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { 
            cursor: pointer; padding: 12px; border: 1px solid #444; border-radius: 4px;
            background: #3c4043; color: #bdc1c6; font-size: 11px; font-weight: bold;
        }
        button.active { background: #8ab4f8; color: #202124; border-color: white; }
        #status { font-size: 12px; color: #9aa0a6; text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="status">Select a Token</div>
    <div class="grid">
        <button id="btn-BLN" onclick="window.toggle('BLN', '#ff6b6b')">Blinded</button>
        <button id="btn-POI" onclick="window.toggle('POI', '#51cf66')">Poisoned</button>
        <button id="btn-PRN" onclick="window.toggle('PRN', '#fcc419')">Prone</button>
        <button id="btn-STU" onclick="window.toggle('STU', '#339af0')">Stunned</button>
    </div>

<script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";
    const ID = "com.quadrant.status";

    window.toggle = async (code, color) => {
        const sel = await OBR.player.getSelection();
        if (!sel?.length) return;
        await OBR.scene.items.updateItems(sel, (items) => {
            for (let item of items) {
                let meta = item.metadata[ID] || { c: [] };
                const i = meta.c.findIndex(x => x.code === code);
                if (i > -1) meta.c.splice(i, 1);
                else if (meta.c.length < 4) meta.c.push({ code, color });
                item.metadata[ID] = meta;
            }
        });
    };

    async function sync(items) {
        const sel = await OBR.player.getSelection();
        const selectedId = sel?.[0];
        
        // 1. UI Selection Sync
        if (selectedId) {
            const active = items.find(i => i.id === selectedId);
            if (active) {
                document.getElementById('status').innerText = (active.name || "Token").toUpperCase();
                const meta = active.metadata[ID] || { c: [] };
                document.querySelectorAll('button').forEach(btn => {
                    const code = btn.id.split('-')[1];
                    btn.classList.toggle('active', meta.c.some(x => x.code === code));
                });
            }
        }

        // 2. Map Label Sync
        const existingLabels = items.filter(i => i.metadata[ID]?.isLabel);
        const tokens = items.filter(i => i.metadata[ID]?.c?.length > 0);
        const desiredIds = new Set();
        const toAdd = [];

        for (const t of tokens) {
            const conds = t.metadata[ID].c;
            const size = (t.image?.width || 150);
            const offset = size / 3;
            const posMap = [{x:-offset, y:-offset}, {x:offset, y:-offset}, {x:-offset, y:offset}, {x:offset, y:offset}];

            conds.forEach((c, i) => {
                const lid = `label-${t.id}-${c.code}`;
                desiredIds.add(lid);

                if (!existingLabels.some(l => l.id === lid)) {
                    const label = OBR.buildText()
                        .id(lid)
                        .text({
                            type: "PLAIN", // This is the object structure required
                            plainText: c.code
                        })
                        .fontSize(size / 6)
                        .fontWeight(800)
                        .fillColor(c.color)
                        .strokeColor("black")
                        .strokeWidth(2)
                        .position({ x: posMap[i].x, y: posMap[i].y }) // Relative to parent
                        .attachedTo(t.id)
                        .layer("TEXT")
                        .locked(true)
                        .disableHit(true)
                        .metadata({ [ID]: { isLabel: true } })
                        .build();
                    toAdd.push(label);
                }
            });
        }

        // Cleanup old labels
        const toDelete = existingLabels.filter(l => !desiredIds.has(l.id)).map(l => l.id);
        if (toDelete.length) await OBR.scene.items.deleteItems(toDelete);
        // Add new labels
        if (toAdd.length) await OBR.scene.items.addItems(toAdd);
    }

    OBR.onReady(() => {
        OBR.scene.items.onChange(sync);
        // Ensure UI stays snappy on selection
        OBR.player.onChange(async () => sync(await OBR.scene.items.getItems()));
    });
</script>
</body>
</html>
