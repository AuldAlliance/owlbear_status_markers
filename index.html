<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@owlbear-rodeo/sdk"></script>
    <style>
        body { background: #202124; color: white; font-family: sans-serif; padding: 10px; margin: 0; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { cursor: pointer; padding: 12px; background: #3c4043; color: #eee; border: 1px solid #444; border-radius: 4px; font-size: 11px; font-weight: bold; }
        button.active { background: #4285f4; color: white; border-color: white; }
        #debug-console { margin-top: auto; background: #000; color: #0f0; font-family: monospace; font-size: 10px; padding: 8px; border-radius: 4px; height: 120px; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="status" style="text-align:center; font-size:12px; color:#9aa0a6;">SELECT A TOKEN</div>
    <div class="grid">
        <button id="btn-BLN" onclick="window.toggle('BLN', '#ff4444')">Blinded</button>
        <button id="btn-POI" onclick="window.toggle('POI', '#00ff88')">Poisoned</button>
        <button id="btn-PRN" onclick="window.toggle('PRN', '#ffcc00')">Prone</button>
        <button id="btn-STU" onclick="window.toggle('STU', '#00ccff')">Stunned</button>
    </div>
    <div id="debug-console">Console initialized...</div>

<script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";
    const ID = "com.quadrant.status";
    const logEl = document.getElementById('debug-console');

    function log(msg, isErr = false) {
        const div = document.createElement('div');
        if (isErr) div.style.color = "#ff4444";
        div.innerText = `> ${msg}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    // --- THE CORE SYNC LOGIC ---
    async function runFullSync() {
        log("Running Sync...");
        const items = await OBR.scene.items.getItems();
        const selection = await OBR.player.getSelection();
        
        // 1. Update Buttons
        if (selection.length > 0) {
            const token = items.find(i => i.id === selection[0]);
            if (token) {
                document.getElementById('status').innerText = (token.name || "Token").toUpperCase();
                const meta = token.metadata[ID] || { c: [] };
                document.querySelectorAll('button').forEach(btn => {
                    const code = btn.id.split('-')[1];
                    btn.classList.toggle('active', meta.c.some(x => x.code === code));
                });
            }
        }

        // 2. Manage Labels
        const myLabels = items.filter(i => i.metadata[ID]?.isMarker);
        const tokensWithData = items.filter(i => i.metadata[ID]?.c?.length > 0);
        
        let toAdd = [];
        let keptIds = new Set();

        for (const t of tokensWithData) {
            const conds = t.metadata[ID].c;
            const size = (t.image?.width || 150);
            const off = size / 3;
            const pts = [{x:-off, y:-off}, {x:off, y:-off}, {x:-off, y:off}, {x:off, y:off}];

            conds.forEach((c, i) => {
                const existing = myLabels.find(m => m.metadata[ID]?.owner === t.id && m.metadata[ID]?.code === c.code);
                if (existing) {
                    keptIds.add(existing.id);
                } else {
                    log(`Creating label for ${c.code}`);
                    const label = OBR.buildText()
                        .id(`L-${t.id}-${c.code}-${Date.now()}`)
                        .text({ type: "PLAIN", plainText: c.code })
                        .fontSize(size / 6)
                        .fontWeight(800)
                        .fillColor(c.color)
                        .strokeColor("black")
                        .strokeWidth(2)
                        .position({ x: t.position.x + pts[i].x, y: t.position.y + pts[i].y })
                        .attachedTo(t.id)
                        .layer("TEXT")
                        .metadata({ [ID]: { isMarker: true, owner: t.id, code: c.code } })
                        .build();
                    toAdd.push(label);
                }
            });
        }

        const toDelete = myLabels.filter(m => !keptIds.has(m.id)).map(m => m.id);
        if (toDelete.length > 0) await OBR.scene.items.deleteItems(toDelete);
        if (toAdd.length > 0) {
            try {
                await OBR.scene.items.addItems(toAdd);
                log(`Success: Added ${toAdd.length}`);
            } catch (e) { log(`Add Error: ${e.message}`, true); }
        }
    }

    // --- THE TOGGLE COMMAND ---
    window.toggle = async (code, color) => {
        const sel = await OBR.player.getSelection();
        if (!sel.length) return;

        log(`Toggle ${code} start...`);
        await OBR.scene.items.updateItems(sel, (items) => {
            for (let item of items) {
                let meta = JSON.parse(JSON.stringify(item.metadata[ID] || { c: [] }));
                const i = meta.c.findIndex(x => x.code === code);
                if (i > -1) meta.c.splice(i, 1);
                else if (meta.c.length < 4) meta.c.push({ code, color });
                item.metadata[ID] = meta;
            }
        });
        
        // DIRECT CALL: Don't wait for OBR to notice, just do it.
        await runFullSync();
    };

    OBR.onReady(() => {
        log("Ready.");
        // Listen for selection changes only
        OBR.player.onChange(runFullSync);
        runFullSync();
    });
</script>
</body>
</html>
