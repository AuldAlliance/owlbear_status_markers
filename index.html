<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@owlbear-rodeo/sdk"></script>
    <style>
        body { background: #1a1a1c; color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
        button { 
            cursor: pointer; padding: 10px 2px; border: 1px solid #444; border-radius: 4px;
            background: #2a2a2e; color: #888; font-size: 10px; font-weight: bold;
        }
        button.active { background: #2196F3; color: white; border-color: #fff; }
        #status { font-size: 11px; color: #666; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">SELECT A TOKEN</div>
    <div class="grid">
        <button id="btn-BLN" onclick="window.toggle('BLN', '#ff4444')">Blinded</button>
        <button id="btn-POI" onclick="window.toggle('POI', '#00ff88')">Poisoned</button>
        <button id="btn-PRN" onclick="window.toggle('PRN', '#ffcc00')">Prone</button>
        <button id="btn-STU" onclick="window.toggle('STU', '#00ccff')">Stunned</button>
    </div>

<script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";
    const ID = "com.quadrant.status";

    window.toggle = async (code, color) => {
        const sel = await OBR.player.getSelection();
        if (!sel?.length) return;
        await OBR.scene.items.updateItems(sel, (items) => {
            items.forEach(item => {
                let meta = item.metadata[ID] || { c: [] };
                const i = meta.c.findIndex(x => x.code === code);
                if (i > -1) meta.c.splice(i, 1);
                else if (meta.c.length < 4) meta.c.push({ code, color });
                item.metadata[ID] = meta;
            });
        });
    };

    async function sync(items) {
        const sel = await OBR.player.getSelection();
        const selectedId = sel?.[0];
        
        // 1. UI Sync
        if (selectedId) {
            const active = items.find(i => i.id === selectedId);
            if (active) {
                document.getElementById('status').innerText = (active.name || "Token").toUpperCase();
                const meta = active.metadata[ID] || { c: [] };
                document.querySelectorAll('button').forEach(btn => {
                    btn.classList.toggle('active', meta.c.some(x => x.code === btn.id.split('-')[1]));
                });
            }
        }

        // 2. Map Render Logic (Using Shapes instead of Text for better reliability)
        const myMarkers = items.filter(i => i.metadata[ID]?.isMarker);
        const tokens = items.filter(i => i.metadata[ID]?.c?.length > 0);
        const validIds = new Set();
        const toAdd = [];

        for (const t of tokens) {
            const conds = t.metadata[ID].c;
            const size = (t.image?.width || 150) * (t.scale?.x || 1);
            const radius = size / 4.5; // Size of the marker
            const off = size / 3;      // Distance from center

            const pts = [{x:-off, y:-off}, {x:off, y:-off}, {x:-off, y:off}, {x:off, y:off}];

            conds.forEach((c, i) => {
                const mid = `M-${t.id}-${c.code}`;
                validIds.add(mid);

                if (!myMarkers.some(m => m.id === mid)) {
                    // We build a simple CIRCLE shape. It is much more robust than Text.
                    const marker = OBR.buildShape()
                        .id(mid)
                        .shapeType("CIRCLE")
                        .width(radius)
                        .height(radius)
                        .fillColor(c.color)
                        .strokeColor("black")
                        .strokeWidth(2)
                        .position({ x: t.position.x + pts[i].x, y: t.position.y + pts[i].y })
                        .attachedTo(t.id)
                        .layer("ATTACHMENT")
                        .locked(true)
                        .disableHit(true)
                        .metadata({ [ID]: { isMarker: true } })
                        .build();
                    toAdd.push(marker);
                }
            });
        }

        // 3. Scene Sync
        const toDelete = myMarkers.filter(m => !validIds.has(m.id)).map(m => m.id);
        if (toDelete.length) await OBR.scene.items.deleteItems(toDelete);
        if (toAdd.length) await OBR.scene.items.addItems(toAdd);

        // 4. Position Update (Keeps markers attached during move)
        const toUpdate = myMarkers.filter(m => validIds.has(m.id));
        if (toUpdate.length) {
            await OBR.scene.items.updateItems(toUpdate.map(m => m.id), (itms) => {
                itms.forEach(m => {
                    const parent = items.find(i => i.id === m.attachedTo);
                    if (parent) {
                        const idx = parent.metadata[ID].c.findIndex(c => `M-${parent.id}-${c.code}` === m.id);
                        const size = (parent.image?.width || 150) * (parent.scale?.x || 1);
                        const off = size / 3;
                        const pts = [{x:-off, y:-off}, {x:off, y:-off}, {x:-off, y:off}, {x:off, y:off}];
                        m.position = { x: parent.position.x + pts[idx].x, y: parent.position.y + pts[idx].y };
                    }
                });
            });
        }
    }

    OBR.onReady(() => {
        OBR.scene.items.onChange(sync);
        OBR.player.onChange(async (p) => sync(await OBR.scene.items.getItems()));
    });
</script>
</body>
</html>
