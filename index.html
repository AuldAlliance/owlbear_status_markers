<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@owlbear-rodeo/sdk"></script>
    <style>
        body { background: #1a1a1c; color: white; font-family: sans-serif; padding: 10px; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { cursor: pointer; padding: 12px; background: #333; color: #eee; border: 1px solid #444; border-radius: 4px; }
        button.active { background: #4285f4; color: white; }
        #debug { margin-top: auto; background: #000; color: #0f0; font-family: monospace; font-size: 10px; padding: 8px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="status" style="text-align:center">SELECT TOKEN</div>
    <div class="grid">
        <button id="btn-BLN" onclick="window.toggle('BLN', '#ff4444')">BLN</button>
        <button id="btn-POI" onclick="window.toggle('POI', '#00ff88')">POI</button>
    </div>
    <div id="debug">> System Ready</div>

<script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";
    const ID = "com.quadrant.debug";
    const logEl = document.getElementById('debug');

    function log(msg) {
        logEl.innerHTML += `<div>> ${msg}</div>`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    window.toggle = async (code, color) => {
        const sel = await OBR.player.getSelection();
        if (!sel.length) return;

        await OBR.scene.items.updateItems(sel, (items) => {
            for (let item of items) {
                let meta = JSON.parse(JSON.stringify(item.metadata[ID] || { c: [] }));
                const i = meta.c.findIndex(x => x.code === code);
                if (i > -1) meta.c.splice(i, 1);
                else if (meta.c.length < 4) meta.c.push({ code, color });
                item.metadata[ID] = meta;
            }
        });

        const items = await OBR.scene.items.getItems();
        const tokens = items.filter(i => i.metadata[ID]?.c?.length > 0);
        const myMarkers = items.filter(i => i.metadata[ID]?.isMarker);
        
        let toAdd = [];
        let activeIds = new Set();

        for (const t of tokens) {
            t.metadata[ID].c.forEach((c, i) => {
                const lid = `L-${t.id}-${c.code}`;
                activeIds.add(lid);

                if (!myMarkers.some(m => m.id === lid)) {
                    log(`Building Shape for ${c.code}...`);
                    // MANUAL OBJECT CONSTRUCTION to ensure no missing properties
                    const shape = OBR.buildShape()
                        .id(lid)
                        .shapeType("CIRCLE")
                        .width(30).height(30)
                        .fillColor(c.color)
                        .attachedTo(t.id)
                        .layer("ATTACHMENT")
                        .metadata({ [ID]: { isMarker: true } })
                        .build();
                    
                    // FORCE TYPE (The secret fix)
                    shape.type = "SHAPE"; 
                    toAdd.push(shape);
                }
            });
        }

        const toDelete = myMarkers.filter(m => !activeIds.has(m.id)).map(m => m.id);
        if (toDelete.length) await OBR.scene.items.deleteItems(toDelete);
        
        if (toAdd.length > 0) {
            log(`Calling addItems with ${toAdd.length} objects...`);
            try {
                await OBR.scene.items.addItems(toAdd);
                log("API call finished.");
            } catch (e) {
                log(`API REJECTED: ${e.message}`);
            }
        }
    };

    OBR.onReady(() => log("OBR Connected. Select a token and click a button."));
</script>
</body>
</html>
