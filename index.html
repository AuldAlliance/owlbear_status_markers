<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="https://unpkg.com/@owlbear-rodeo/sdk"></script>
  <style>
    :root { --bg: #202020; --text: #eee; --accent: #3498db; }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background: var(--bg); color: var(--text); padding: 15px; 
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button { 
      border: none; border-radius: 6px; padding: 12px 5px; 
      font-weight: 800; color: white; cursor: pointer; font-size: 0.75rem;
    }
    button:active { transform: scale(0.95); }
    #status { 
      margin-top: 15px; font-size: 0.8rem; text-align: center; 
      padding: 8px; border-radius: 4px; background: #333;
    }
  </style>
</head>
<body>

  <div style="text-align:center; margin-bottom:15px;">
    <strong style="color:var(--accent)">QUADRANT STATUS</strong>
  </div>
  
  <div class="grid">
    <button style="background:#e74c3c" onclick="toggle('BLN', '#e74c3c')">BLINDED</button>
    <button style="background:#2ecc71" onclick="toggle('POI', '#2ecc71')">POISONED</button>
    <button style="background:#f1c40f; color: #222" onclick="toggle('PRN', '#f1c40f')">PRONE</button>
    <button style="background:#9b59b6" onclick="toggle('FRI', '#9b59b6')">FEAR</button>
    <button style="background:#e67e22" onclick="toggle('FIR', '#e67e22')">FIRE</button>
    <button style="background:#3498db" onclick="toggle('STU', '#3498db')">STUNNED</button>
  </div>

  <div id="status">Checking connection...</div>

  <script>
    const OBR = window.OBR;
    const ID = "com.quadrant.status.v1"; // Unique key for metadata

    // --- 1. TOGGLE CONDITION ---
    async function toggle(code, color) {
      const selection = await OBR.player.getSelection();
      console.log("Toggle clicked for:", code, "Selection:", selection);

      if (!selection || selection.length === 0) {
        updateStatus("⚠️ Select a token first", "#f1c40f");
        return;
      }

      await OBR.scene.items.updateItems(selection, (items) => {
        for (const item of items) {
          // Initialize metadata structure if missing
          let meta = item.metadata[ID] || { conditions: [] };
          
          const index = meta.conditions.findIndex(c => c.code === code);
          if (index > -1) {
            meta.conditions.splice(index, 1); // Remove
          } else if (meta.conditions.length < 4) {
            meta.conditions.push({ code, color }); // Add
          }
          
          item.metadata[ID] = meta;
          console.log("Updated metadata for item:", item.id, meta);
        }
      });
    }

    // --- 2. RENDER LABELS ---
    async function render(items) {
      // Find and delete ALL old labels from this extension
      const oldLabels = await OBR.scene.items.getItems((item) => item.metadata[ID]?.isLabel === true);
      if (oldLabels.length > 0) {
        await OBR.scene.items.deleteItems(oldLabels.map(l => l.id));
      }

      const labelsToAdd = [];

      // Filter for items that have our condition metadata
      const tokens = items.filter(i => i.metadata[ID]?.conditions?.length > 0);

      for (const token of tokens) {
        const conds = token.metadata[ID].conditions;
        
        // Calculate dynamic dimensions based on image & scale
        const w = (token.image?.width || 150) * (token.scale?.x || 1);
        const h = (token.image?.height || 150) * (token.scale?.y || 1);

        const offsets = [
          { x: -w/3.5, y: -h/3.5, rot: -45 },  // Q1
          { x: w/3.5,  y: -h/3.5, rot: 45 },   // Q2
          { x: -w/3.5, y: h/3.5,  rot: -135 }, // Q3
          { x: w/3.5,  y: h/3.5,  rot: 135 }   // Q4
        ];

        conds.forEach((c, i) => {
          if (i > 3) return;
          const off = offsets[i];

          const label = OBR.buildText()
            .plainText(c.code)
            .fontSize(w / 8)
            .fontWeight(800)
            .fillColor(c.color)
            .strokeColor("black")
            .strokeWidth(2)
            .textAlign("CENTER")
            .position({ 
              x: token.position.x + off.x, 
              y: token.position.y + off.y 
            })
            // Important: add the token's current rotation to the offset rotation
            .rotation(off.rot + (token.rotation || 0))
            .attachedTo(token.id)
            .layer("ATTACHMENT")
            .disableHit(true) // Stops the label from blocking token clicks
            .metadata({ [ID]: { isLabel: true } })
            .build();

          labelsToAdd.push(label);
        });
      }

      if (labelsToAdd.length > 0) {
        await OBR.scene.items.addItems(labelsToAdd);
      }
    }

    // --- 3. INITIALIZE ---
    function updateStatus(msg, color = "#eee") {
      const el = document.getElementById('status');
      el.innerText = msg;
      el.style.color = color;
    }

    OBR.onReady(() => {
      console.log("OBR Ready");
      updateStatus("Ready: Select a token");

      // Update UI when selection changes
      OBR.player.onChange((player) => {
        const count = player.selection?.length || 0;
        if (count > 0) {
          updateStatus(`✅ ${count} Token(s) Selected`, "#2ecc71");
        } else {
          updateStatus("Select a token on the map");
        }
      });

      // Watch for any changes to trigger a re-render
      OBR.scene.items.onChange((items) => {
        console.log("Scene items changed, re-rendering...");
        render(items);
      });
    });
  </script>
</body>
</html>
