<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://unpkg.com/@owlbear-rodeo/sdk@latest/dist/obr.js"></script>
  <style>
    body { background: #1a1a1a; color: white; font-family: monospace; padding: 15px; }
    .debug-log { background: #000; border: 1px solid #444; padding: 10px; height: 120px; overflow-y: auto; font-size: 11px; color: #0f0; margin-top: 10px; }
    .status-pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; background: #ff4444; margin-bottom: 10px; }
    .status-pill.online { background: #00c853; }
    button { background: #444; color: white; border: 1px solid #666; padding: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="connection-status" class="status-pill">OBR OFFLINE</div>
  <div style="font-size: 14px; font-weight: bold;">Token Marker Debug V2</div>
  
  <div class="debug-log" id="log">Waiting for OBR...</div>
  
  <button id="clear-btn">Clear All Markers</button>

  <script>
    // Since we used a script tag, OBR is now a global variable
    const logEl = document.getElementById('log');
    const statusPill = document.getElementById('connection-status');
    const ID = "com.simple.marker";

    function logger(msg) {
      logEl.innerHTML += `<div>> ${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(`[Debug] ${msg}`);
    }

    async function setup() {
      logger("Handshake Successful!");
      statusPill.innerText = "OBR ONLINE";
      statusPill.classList.add("online");

      try {
        await OBR.contextMenu.create({
          id: `${ID}/menu`,
          icons: [{
            icon: "https://www.owlbear.rodeo/logo.svg",
            label: "Mark Token",
            filter: { every: [{ key: "type", value: "IMAGE" }] },
          }],
          async onClick(context) {
            const tokenIds = context.items.map(item => item.id);
            const allItems = await OBR.scene.items.getItems();
            const markersToRemove = allItems.filter(item => 
              item.attachedTo && tokenIds.includes(item.attachedTo) && item.metadata?.[`${ID}/isMarker`]
            ).map(i => i.id);

            if (markersToRemove.length > 0) {
              await OBR.scene.items.deleteItems(markersToRemove);
            } else {
              const markers = context.items.map(token => OBR.scene.items.buildShape()
                .width(token.width).height(token.height).shapeType("CIRCLE")
                .fillColor("#ff0000").fillOpacity(0.4).position(token.position)
                .attachedTo(token.id).layer("ATTACHMENT").locked(true).disableHit(true)
                .metadata({ [`${ID}/isMarker`]: true }).build()
              );
              await OBR.scene.items.addItems(markers);
            }
          }
        });
        logger("Menu Ready. Right-click a token!");
      } catch (e) {
        logger("Menu error: " + e.message);
      }
    }

    // This is the most critical part:
    OBR.onReady(() => {
      setup();
    });

    document.getElementById('clear-btn').onclick = async () => {
      const allItems = await OBR.scene.items.getItems();
      const markers = allItems.filter(item => item.metadata?.[`${ID}/isMarker`]).map(i => i.id);
      if (markers.length > 0) await OBR.scene.items.deleteItems(markers);
    };
  </script>
</body>
</html>
