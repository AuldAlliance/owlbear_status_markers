<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <script src="https://unpkg.com/@owlbear-rodeo/sdk"></script>
  <style>
    body { font-family: sans-serif; background: #222; color: white; padding: 15px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
    .active { outline: 3px solid #fff; }
    h3 { margin-top: 0; font-size: 1.1rem; }
  </style>
</head>
<body>
  <h3>Token Conditions</h3>
  <div id="controls" class="grid">
    <button style="background:#e74c3c" onclick="toggle('BLN', '#e74c3c')">BLN</button>
    <button style="background:#2ecc71" onclick="toggle('POI', '#2ecc71')">POI</button>
    <button style="background:#f1c40f; color: #000" onclick="toggle('PRN', '#f1c40f')">PRN</button>
    <button style="background:#3498db" onclick="toggle('FRI', '#3498db')">FRI</button>
  </div>

  <script>
    const OBR = window.OBR;
    const EXTENSION_ID = "com.yourname.quadrant_status";

    async function toggle(code, color) {
      const selection = await OBR.player.getSelection();
      if (!selection || selection.length === 0) return alert("Select a token first!");

      await OBR.scene.items.updateItems(selection, (items) => {
        for (const item of items) {
          const metadata = item.metadata[EXTENSION_ID] || { conditions: [] };
          const index = metadata.conditions.findIndex(c => c.code === code);
          
          if (index > -1) {
            metadata.conditions.splice(index, 1); // Remove if exists
          } else if (metadata.conditions.length < 4) {
            metadata.conditions.push({ code, color }); // Add if < 4
          }
          item.metadata[EXTENSION_ID] = metadata;
        }
      });
      refreshVisuals();
    }

    async function refreshVisuals() {
      const items = await OBR.scene.items.getItems((item) => item.metadata[EXTENSION_ID]);
      
      // Clear existing attachments first
      const allAttachments = await OBR.scene.items.getItemAttachments(items.map(i => i.id));
      const toDelete = allAttachments.filter(a => a.metadata[EXTENSION_ID]).map(a => a.id);
      if (toDelete.length > 0) await OBR.scene.items.deleteItems(toDelete);

      const newItems = [];
      for (const item of items) {
        const conditions = item.metadata[EXTENSION_ID].conditions;
        const w = item.image.width;
        const h = item.image.height;

        // Position Logic: Top-Left, Top-Right, Bottom-Left, Bottom-Right
        const offsets = [
          { x: -w/4, y: -h/4, rot: -45 }, { x: w/4, y: -h/4, rot: 45 },
          { x: -w/4, y: h/4, rot: -135 }, { x: w/4, y: h/4, rot: 135 }
        ];

        conditions.forEach((cond, i) => {
          const pos = offsets[i];
          const fontSize = w / 10;

          // Create the Abbreviation Text
          const textLabel = OBR.buildText()
            .plainText(cond.code)
            .fontSize(fontSize)
            .fontWeight(800)
            .fillColor("white")
            .strokeColor("black")
            .strokeWidth(w / 100)
            .position({ x: item.position.x + pos.x, y: item.position.y + pos.y })
            .rotation(pos.rot)
            .attachedTo(item.id)
            .layer("ATTACHMENT")
            .metadata({ [EXTENSION_ID]: true })
            .build();

          newItems.push(textLabel);
        });
      }
      await OBR.scene.items.addItems(newItems);
    }

    OBR.onReady(() => {
      OBR.scene.items.onChange(refreshVisuals);
    });
  </script>
</body>
</html>
