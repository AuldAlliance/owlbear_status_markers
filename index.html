<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@owlbear-rodeo/sdk"></script>
    <style>
        body { background: #1e1e23; color: white; font-family: sans-serif; padding: 20px; }
        button { 
            padding: 15px; width: 100%; cursor: pointer; 
            background: #2196F3; color: white; border: none; 
            border-radius: 4px; font-weight: bold; margin-bottom: 10px;
        }
        button:hover { background: #1976D2; }
        #log { 
            font-size: 11px; color: #00ff00; margin-top: 10px; 
            background: #000; padding: 10px; border-radius: 4px;
            min-height: 80px; white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <button id="testBtn">SPAWN TEST CIRCLE</button>
    <div id="log">Status: Waiting for SDK...</div>

<script type="module">
// We import the specific builders we need
import OBR, { ShapeBuilder, TextBuilder } from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";

const log = (msg) => { 
    const el = document.getElementById('log');
    el.innerText += "\n> " + msg; 
    console.log(msg);
};

document.getElementById('testBtn').onclick = async () => {
    try {
        log("Checking selection...");
        const selection = await OBR.player.getSelection();
        
        if (!selection || selection.length === 0) {
            alert("Please select a token on the map first!");
            return;
        }

        const targetId = selection[0];
        const items = await OBR.scene.items.getItems();
        const targetToken = items.find(i => i.id === targetId);

        if (!targetToken) {
            log("Error: Selected token not found in scene.");
            return;
        }

        log("Using ShapeBuilder...");
        // NEW SYNTAX: Use 'new ShapeBuilder()' instead of 'OBR.buildShape()'
        const circle = new ShapeBuilder()
            .shapeType("CIRCLE")
            .width(60)
            .height(60)
            .fillColor("red")
            .fillOpacity(0.8)
            .strokeColor("white")
            .strokeWidth(2)
            .position(targetToken.position)
            .attachedTo(targetId)
            .layer("ATTACHMENT")
            .locked(true)
            .disableHit(true)
            .build();

        log("Sending to OBR Scene...");
        await OBR.scene.items.addItems([circle]);
        log("SUCCESS: Red dot should be on the token!");

    } catch (error) {
        log("CRITICAL ERROR: " + error.message);
    }
};

OBR.onReady(() => {
    log("SDK Ready. Version: " + OBR.VERSION);
});
</script>
</body>
</html>
