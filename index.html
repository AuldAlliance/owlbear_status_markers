<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      background: #222;
      color: white;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px;
      text-align: center;
      margin: 0;
    }
    h3 { margin-top: 0; color: #ffbb00; }
    p { font-size: 0.9em; opacity: 0.8; margin-bottom: 20px; }
    button {
      background: #ff4444;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #cc0000; }
  </style>
</head>
<body>
  <h3>Token Marker</h3>
  <p>Right-click a Character token to toggle the red status marker.</p>
  
  <button id="clear-btn">Clear All Markers</button>

  <script type="module">
    import OBR from "https://unpkg.com/@owlbear-rodeo/sdk@latest/dist/obr.js";

    const ID = "com.simple.marker";

    document.getElementById('clear-btn').onclick = async () => {
      const allItems = await OBR.scene.items.getItems();
      const markers = allItems
        .filter(item => item.metadata?.[`${ID}/isMarker`])
        .map(i => i.id);
      
      if (markers.length > 0) {
        await OBR.scene.items.deleteItems(markers);
        alert(`Cleared ${markers.length} markers.`);
      } else {
        alert("No markers found to clear.");
      }
    };
  </script>
</body>
</html>
