<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@owlbear-rodeo/sdk"></script>
    <style>
        html { background: transparent; }
        body { 
            background: rgba(30, 30, 35, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            font-family: sans-serif;
            padding: 12px;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 12px;
        }
        #status {
            font-size: 10px;
            font-weight: bold;
            color: #aaa;
            text-transform: uppercase;
        }
        .token-name { color: #2196F3; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #888;
            padding: 12px 4px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        button.active {
            background: #2196F3;
            border-color: #fff;
            color: white;
        }

        #tokenThumb {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<div class="header">
    <img id="tokenThumb" style="display:none">
    <div id="status">Select a Token</div>
</div>

<div class="grid">
    <button id="btn-BLN" onclick="toggle('BLN', '#ff4444')">Blinded</button>
    <button id="btn-POI" onclick="toggle('POI', '#00ff88')">Poisoned</button>
    <button id="btn-PRN" onclick="toggle('PRN', '#ffcc00')">Prone</button>
    <button id="btn-FRI" onclick="toggle('FRI', '#bb66ff')">Fear</button>
    <button id="btn-FIR" onclick="toggle('FIR', '#ff8800')">Fire</button>
    <button id="btn-STU" onclick="toggle('STU', '#00ccff')">Stunned</button>
</div>

<script type="module">
import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";

const ID = "com.auldalliance.quadrant-status";

let currentSelection = [];

// --------------------
// TOGGLE CONDITIONS
// --------------------
window.toggle = async (code, color) => {
    if (!currentSelection.length) return;

    await OBR.scene.items.updateItems(currentSelection, (items) => {
        for (let item of items) {
            let meta = structuredClone(item.metadata[ID] || { conditions: [] });

            const idx = meta.conditions.findIndex(c => c.code === code);

            if (idx > -1) {
                meta.conditions.splice(idx, 1);
            } else {
                meta.conditions.push({ code, color }); // ✅ removed 4-limit
            }

            item.metadata[ID] = meta;
        }
    });

    const items = await OBR.scene.items.getItems();
    sync(items);
};

// --------------------
// MAIN SYNC FUNCTION
// --------------------
async function sync(items) {

    const selectedId = currentSelection?.[0];
    const activeToken = items.find(i => i.id === selectedId);

    const status = document.getElementById('status');
    const thumb = document.getElementById('tokenThumb');

    // ✅ ALWAYS USE FRESH DATA FOR UI
    let meta = { conditions: [] };

    if (activeToken) {
        const freshItems = await OBR.scene.items.getItems();
        const freshToken = freshItems.find(i => i.id === activeToken.id);
        meta = freshToken?.metadata[ID] || { conditions: [] };

        status.innerHTML = `Editing: <span class="token-name">${(activeToken.name || "Token").toUpperCase()}</span>`;

        if (activeToken.image?.url) {
            thumb.src = activeToken.image.url;
            thumb.style.display = "block";
        }

        document.querySelectorAll('button').forEach(btn => {
            const code = btn.id.split('-')[1];
            btn.classList.toggle('active', meta.conditions.some(c => c.code === code));
        });
    } else {
        status.innerText = "Select a Token";
        thumb.style.display = "none";
    }

    // --------------------
    // LABEL RENDERING
    // --------------------
    const existingLabels = items.filter(i => i.metadata[ID]?.isLabel);
    const tokensWithData = items.filter(i => i.metadata[ID]?.conditions?.length > 0);

    let desiredLabels = [];
    let desiredIds = new Set();

    for (const token of tokensWithData) {

        const conds = token.metadata[ID].conditions;
        const w = (token.image?.width || 150) * (token.scale?.x || 1);
        const offset = w / 3.5;

        const quadrantPos = [
            { x: -offset, y: -offset },
            { x: offset,  y: -offset },
            { x: -offset, y: offset },
            { x: offset,  y: offset }
        ];

        conds.forEach((c, i) => {
            const labelId = `${token.id}-${c.code}`;
            desiredIds.add(labelId);

            const label = OBR.buildText()
                .id(labelId)
                .plainText(c.code)
                .fontSize(w / 6)
                .fontWeight(800)
                .fillColor(c.color)
                .strokeColor("black")
                .strokeWidth(2)
                .textAlign("CENTER")
                .textType("PLAIN")
                .position({
                    x: token.position.x + quadrantPos[i % 4].x,
                    y: token.position.y + quadrantPos[i % 4].y
                })
                .rotation(token.rotation || 0)
                .layer("FLOATING") // 🔥 FIXED RENDERING
                .locked(true)
                .disableHit(true)
                .pointerEvents("NONE")
                .visible(true)
                .zIndex(1000)
                .metadata({ [ID]: { isLabel: true } })
                .build();

            desiredLabels.push(label);
        });
    }

    // CLEANUP
    const toDelete = existingLabels
        .filter(l => !desiredIds.has(l.id))
        .map(l => l.id);

    if (toDelete.length) {
        await OBR.scene.items.deleteItems(toDelete);
    }

    const toAdd = desiredLabels.filter(dl => !existingLabels.some(el => el.id === dl.id));
    if (toAdd.length) {
        await OBR.scene.items.addItems(toAdd);
    }

    const toUpdate = desiredLabels.filter(dl => existingLabels.some(el => el.id === dl.id));
    if (toUpdate.length) {
        await OBR.scene.items.updateItems(toUpdate.map(l => l.id), (items) => {
            items.forEach(item => {
                const latest = toUpdate.find(u => u.id === item.id);
                item.position = latest.position;
                item.visible = true;
            });
        });
    }
}

// --------------------
// INIT
// --------------------
OBR.onReady(() => {

    OBR.player.onChange(async () => {
        currentSelection = await OBR.player.getSelection();
        const items = await OBR.scene.items.getItems();
        sync(items);
    });

    OBR.scene.items.onChange(sync);

    OBR.scene.items.getItems().then(async (items) => {
        currentSelection = await OBR.player.getSelection();
        sync(items);
    });
});
</script>

</body>
</html>
