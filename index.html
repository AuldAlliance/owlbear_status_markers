<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://unpkg.com/@owlbear-rodeo/sdk@latest/dist/obr.js"></script>
  <script type="module">
    // Using the global OBR object provided by the script tag above
    OBR.onReady(() => {
      OBR.contextMenu.create({
        id: "com.simple.marker/menu",
        icons: [
          {
            icon: "https://www.owlbear.rodeo/logo.svg",
            label: "Mark Token",
            filter: {
              every: [{ key: "type", value: "IMAGE" }],
            },
          },
        ],
        async onClick(context) {
          const tokenIds = context.items.map(item => item.id);
          
          // 1. Get ALL items in the scene to find existing markers
          const allItems = await OBR.scene.items.getItems();
          
          // 2. Find markers already attached to these tokens
          const markerIdsToRemove = allItems
            .filter(item => 
              item.attachedTo && 
              tokenIds.includes(item.attachedTo) && 
              item.metadata?.["com.simple.marker/isMarker"]
            )
            .map(item => item.id);

          if (markerIdsToRemove.length > 0) {
            // TOGGLE OFF: Delete existing markers
            await OBR.scene.items.deleteItems(markerIdsToRemove);
          } else {
            // TOGGLE ON: Create new markers
            const markers = context.items.map((token) => {
              return OBR.scene.items.buildShape()
                .width(token.width)
                .height(token.height)
                .shapeType("CIRCLE")
                .fillColor("#ff0000")
                .fillOpacity(0.4)
                .strokeColor("#000000")
                .strokeWidth(2)
                // Use a slight offset or the exact center
                .position(token.position) 
                .attachedTo(token.id)
                .layer("ATTACHMENT")
                .locked(true) // Keeps it from being dragged off the token
                .disableHit(true) // Ensures you click the token, not the marker
                .metadata({ "com.simple.marker/isMarker": true })
                .build();
            });

            await OBR.scene.items.addItems(markers);
          }
        }
      });
    });
  </script>
</head>

<body style="background:#222;color:white;font-family:sans-serif;padding:10px;text-align:center;">
  <h3 style="margin-bottom: 5px;">Token Marker</h3>
  <p style="font-size: 0.8em; opacity: 0.8;">Right-click a token to toggle the marker.</p>
</body>
</html>
