<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@owlbear-rodeo/sdk"></script>
    <style>
        body { background: #1a1a1d; color: #eee; font-family: system-ui; padding: 10px; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { 
            cursor: pointer; padding: 12px 5px; border: 1px solid #444; border-radius: 6px;
            background: #2d2d30; color: #aaa; font-size: 11px; font-weight: bold; transition: 0.2s;
        }
        button.active { background: #3498db; color: white; border-color: #5dade2; box-shadow: 0 0 10px rgba(52, 152, 219, 0.5); }
        #status { font-size: 12px; color: #888; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="status">Select a Token</div>
    <div class="grid">
        <button id="btn-BLN" onclick="window.toggle('BLN', '#e74c3c')">Blinded</button>
        <button id="btn-POI" onclick="window.toggle('POI', '#2ecc71')">Poisoned</button>
        <button id="btn-PRN" onclick="window.toggle('PRN', '#f1c40f')">Prone</button>
        <button id="btn-STU" onclick="window.toggle('STU', '#9b59b6')">Stunned</button>
    </div>

<script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";
    const ID = "com.quadrant.status";

    window.toggle = async (code, color) => {
        const sel = await OBR.player.getSelection();
        if (!sel?.length) return;
        await OBR.scene.items.updateItems(sel, (items) => {
            items.forEach(item => {
                let meta = item.metadata[ID] || { c: [] };
                const i = meta.c.findIndex(x => x.code === code);
                if (i > -1) meta.c.splice(i, 1);
                else if (meta.c.length < 4) meta.c.push({ code, color });
                item.metadata[ID] = meta;
            });
        });
    };

    async function sync(items) {
        const sel = await OBR.player.getSelection();
        const selectedId = sel?.[0];
        
        // UI Update
        if (selectedId) {
            const active = items.find(i => i.id === selectedId);
            if (active) {
                document.getElementById('status').innerText = (active.name || "Token");
                const meta = active.metadata[ID] || { c: [] };
                document.querySelectorAll('button').forEach(btn => {
                    btn.classList.toggle('active', meta.c.some(x => x.code === btn.id.split('-')[1]));
                });
            }
        }

        // Logic to draw/remove labels
        const labelsOnMap = items.filter(i => i.metadata[ID]?.isLabel);
        const tokensWithConditions = items.filter(i => i.metadata[ID]?.c?.length > 0);
        const activeLabelIds = new Set();
        const newLabels = [];

        for (const t of tokensWithConditions) {
            const conds = t.metadata[ID].c;
            const size = (t.image?.width || 150); 
            const offset = size * 0.35; // Position relative to center
            const positions = [{x:-offset, y:-offset}, {x:offset, y:-offset}, {x:-offset, y:offset}, {x:offset, y:offset}];

            conds.forEach((c, i) => {
                const lid = `L-${t.id}-${c.code}`;
                activeLabelIds.add(lid);

                if (!labelsOnMap.some(l => l.id === lid)) {
                    const label = OBR.buildLabel()
                        .id(lid)
                        .plainText(c.code)
                        .fillColor(c.color)
                        .strokeColor("black")
                        .position({ x: t.position.x + positions[i].x, y: t.position.y + positions[i].y })
                        .attachedTo(t.id)
                        .layer("CHARACTER")
                        .locked(true)
                        .disableHit(true)
                        .metadata({ [ID]: { isLabel: true } })
                        .build();
                    newLabels.push(label);
                }
            });
        }

        // Sync Scene
        const toDelete = labelsOnMap.filter(l => !activeLabelIds.has(l.id)).map(l => l.id);
        if (toDelete.length) await OBR.scene.items.deleteItems(toDelete);
        if (newLabels.length) await OBR.scene.items.addItems(newLabels);
        
        // Movement/Rotation Fix
        const toUpdate = labelsOnMap.filter(l => activeLabelIds.has(l.id));
        if (toUpdate.length) {
            await OBR.scene.items.updateItems(toUpdate.map(l => l.id), (itms) => {
                itms.forEach(lbl => {
                    const token = items.find(i => i.id === lbl.attachedTo);
                    if (token) {
                        const idx = token.metadata[ID].c.findIndex(c => `L-${token.id}-${c.code}` === lbl.id);
                        const size = (token.image?.width || 150);
                        const off = size * 0.35;
                        const pts = [{x:-off, y:-off}, {x:off, y:-off}, {x:-off, y:off}, {x:off, y:off}];
                        if (idx !== -1) {
                           lbl.position = { x: token.position.x + pts[idx].x, y: token.position.y + pts[idx].y };
                        }
                    }
                });
            });
        }
    }

    OBR.onReady(() => {
        OBR.scene.items.onChange(sync);
        OBR.player.onChange(async () => sync(await OBR.scene.items.getItems()));
    });
</script>
</body>
</html>
