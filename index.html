<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quadrant Status Extension</title>
    <style>
        html { background: transparent; }
        body { 
            background: rgba(30, 30, 35, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            font-family: sans-serif;
            padding: 12px;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 12px;
        }
        #status {
            font-size: 10px;
            font-weight: bold;
            color: #aaa;
            text-transform: uppercase;
        }
        .token-name { color: #2196F3; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #888;
            padding: 12px 4px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button.active {
            background: #2196F3;
            border-color: #fff;
            color: white;
        }

        #tokenThumb {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<div class="header">
    <img id="tokenThumb" style="display:none">
    <div id="status">Select a Token</div>
</div>

<div class="grid">
    <button id="btn-BLN" data-code="BLN" data-color="#ff4444">Blinded</button>
    <button id="btn-POI" data-code="POI" data-color="#00ff88">Poisoned</button>
    <button id="btn-PRN" data-code="PRN" data-color="#ffcc00">Prone</button>
    <button id="btn-FRI" data-code="FRI" data-color="#bb66ff">Fear</button>
    <button id="btn-FIR" data-code="FIR" data-color="#ff8800">Fire</button>
    <button id="btn-STU" data-code="STU" data-color="#00ccff">Stunned</button>
</div>

<script type="module">
import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";

const ID = "com.auldalliance.quadrant-status";

// --------------------
// TOGGLE LOGIC
// --------------------
async function toggleCondition(code, color) {
    const selection = await OBR.player.getSelection();
    if (!selection || selection.length === 0) return;

    await OBR.scene.items.updateItems(selection, (items) => {
        for (let item of items) {
            let meta = item.metadata[ID] || { conditions: [] };
            const conditions = Array.isArray(meta.conditions) ? [...meta.conditions] : [];
            
            const idx = conditions.findIndex(c => c.code === code);
            if (idx > -1) {
                conditions.splice(idx, 1);
            } else {
                conditions.push({ code, color });
            }

            item.metadata[ID] = { ...meta, conditions };
        }
    });
}

// --------------------
// SYNC & RENDER
// --------------------
async function sync(items) {
    const selection = await OBR.player.getSelection();
    const activeToken = items.find(i => i.id === selection?.[0]);

    const statusEl = document.getElementById('status');
    const thumbEl = document.getElementById('tokenThumb');

    // 1. UPDATE UI BUTTONS
    if (activeToken) {
        const meta = activeToken.metadata[ID] || { conditions: [] };
        statusEl.innerHTML = `Editing: <span class="token-name">${(activeToken.name || "Token").toUpperCase()}</span>`;
        
        if (activeToken.image?.url) {
            thumbEl.src = activeToken.image.url;
            thumbEl.style.display = "block";
        }

        document.querySelectorAll('button').forEach(btn => {
            const code = btn.getAttribute('data-code');
            const isActive = meta.conditions.some(c => c.code === code);
            btn.className = isActive ? 'active' : '';
        });
    } else {
        statusEl.innerText = "Select a Token";
        thumbEl.style.display = "none";
        document.querySelectorAll('button').forEach(btn => btn.className = '');
    }

    // 2. LABEL RENDERING LOGIC
    const existingLabels = items.filter(i => i.metadata[ID]?.isLabel);
    const tokensWithData = items.filter(i => i.metadata[ID]?.conditions?.length > 0);

    let desiredLabels = [];
    let desiredIds = new Set();

    for (const token of tokensWithData) {
        const conds = token.metadata[ID].conditions;
        const w = (token.image?.width || 150) * (token.scale?.x || 1);
        const offset = w / 3.5;

        const quadrantPos = [
            { x: -offset, y: -offset },
            { x: offset,  y: -offset },
            { x: -offset, y: offset },
            { x: offset,  y: offset }
        ];

        conds.forEach((c, i) => {
            const labelId = `${token.id}-${c.code}`;
            desiredIds.add(labelId);

            const label = OBR.buildText()
                .id(labelId)
                .plainText(c.code)
                .fontSize(w / 6)
                .fontWeight(800)
                .fillColor(c.color)
                .strokeColor("black")
                .strokeWidth(2)
                .textAlign("CENTER")
                .textType("PLAIN")
                .position({
                    x: token.position.x + quadrantPos[i % 4].x,
                    y: token.position.y + quadrantPos[i % 4].y
                })
                .rotation(token.rotation || 0)
                .layer("ATTACHMENT") // Use ATTACHMENT so it moves with the token automatically
                .locked(true)
                .disableHit(true)
                .visible(token.visible)
                .metadata({ [ID]: { isLabel: true } })
                .build();

            desiredLabels.push(label);
        });
    }

    // CLEANUP UNUSED LABELS
    const toDelete = existingLabels.filter(l => !desiredIds.has(l.id)).map(l => l.id);
    if (toDelete.length) await OBR.scene.items.deleteItems(toDelete);

    // ADD NEW LABELS
    const toAdd = desiredLabels.filter(dl => !existingLabels.some(el => el.id === dl.id));
    if (toAdd.length) await OBR.scene.items.addItems(toAdd);

    // UPDATE POSITIONS OF EXISTING LABELS
    const toUpdate = desiredLabels.filter(dl => existingLabels.some(el => el.id === dl.id));
    if (toUpdate.length) {
        await OBR.scene.items.updateItems(toUpdate.map(l => l.id), (items) => {
            items.forEach(item => {
                const latest = toUpdate.find(u => u.id === item.id);
                if (latest) {
                    item.position = latest.position;
                    item.rotation = latest.rotation;
                    item.visible = latest.visible;
                }
            });
        });
    }
}

// --------------------
// INITIALIZATION
// --------------------
OBR.onReady(() => {
    // Setup button clicks
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
            const code = btn.getAttribute('data-code');
            const color = btn.getAttribute('data-color');
            toggleCondition(code, color);
        });
    });

    // Watch for selection changes
    OBR.player.onChange(async () => {
        const items = await OBR.scene.items.getItems();
        sync(items);
    });

    // Watch for scene changes
    OBR.scene.items.onChange((items) => {
        sync(items);
    });

    // Initial run
    OBR.scene.items.getItems().then(sync);
});
</script>

</body>
</html>
