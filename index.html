<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Token Marker Extension</title>
</head>
<body>
  <script type="module">
    import OBR from "https://unpkg.com/@owlbear-rodeo/sdk@latest/dist/obr.js";

    OBR.onReady(() => {
      // Create the context menu item
      OBR.contextMenu.create({
        id: "com.simple.marker/mark",
        icons: [
          {
            icon: "https://www.owlbear.rodeo/logo.svg", // Placeholder icon
            label: "Add Circle Mark",
            filter: {
              every: [{ key: "type", value: "IMAGE" }],
            },
          },
        ],
        async onClick(context) {
          const markers = [];

          for (const token of context.selection.items) {
            // Build the circle shape
            const circle = OBR.scene.items.buildShape()
              .width(token.width)
              .height(token.height)
              .shapeType("CIRCLE")
              .fillColor("#ff0000")
              .fillOpacity(0.4)
              .strokeColor("#000000")
              .strokeWidth(2)
              .position(token.position)
              .attachedTo(token.id) // Pins it to the token
              .layer("ATTACHMENT")
              .disableHit(true)     // Prevents you from accidentally clicking the mark instead of the token
              .build();

            markers.push(circle);
          }

          // Add the markers to the map
          await OBR.scene.items.addItems(markers);
        },
      });
    });
  </script>
</body>
</html>
