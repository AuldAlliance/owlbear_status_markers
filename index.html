<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@owlbear-rodeo/sdk"></script>
    <style>
        body { background: #222; color: white; font-family: sans-serif; padding: 20px; }
        button { padding: 15px; width: 100%; cursor: pointer; background: #444; color: white; border: none; border-radius: 4px; }
        button:active { background: #666; }
        #log { font-size: 10px; color: #00ff00; margin-top: 10px; background: #000; padding: 5px; height: 50px; overflow-y: auto; }
    </style>
</head>
<body>

    <button id="testBtn">SPAWN TEST CIRCLE</button>
    <div id="log">Status: Waiting for click...</div>

<script type="module">
import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";

const log = (msg) => { document.getElementById('log').innerText += "\n" + msg; };

document.getElementById('testBtn').onclick = async () => {
    try {
        log("Checking selection...");
        const selection = await OBR.player.getSelection();
        
        if (!selection || selection.length === 0) {
            alert("Please select a token on the map first!");
            return;
        }

        const targetId = selection[0];
        const items = await OBR.scene.items.getItems();
        const targetToken = items.find(i => i.id === targetId);

        log("Building circle...");
        // This is the most basic item OBR can render
        const circle = OBR.buildShape()
            .width(100)
            .height(100)
            .shapeType("CIRCLE")
            .fillColor("red")
            .fillOpacity(0.5)
            .strokeColor("white")
            .strokeWidth(4)
            .position(targetToken.position) 
            .layer("MOUNT") // Mount is high-visibility
            .attachedTo(targetId)
            .locked(false)
            .build();

        log("Sending to OBR...");
        await OBR.scene.items.addItems([circle]);
        log("SUCCESS: Item added.");

    } catch (error) {
        log("ERROR: " + error.message);
        console.error(error);
        alert("OBR Rejected the item: " + error.message);
    }
};

OBR.onReady(() => {
    log("SDK Ready.");
});
</script>
</body>
</html>
