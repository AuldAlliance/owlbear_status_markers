<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://unpkg.com/@owlbear-rodeo/sdk@latest/dist/obr.js"></script>
</head>
<body style="background:#222;color:#0f0;font-family:monospace;padding:20px;">
  <div id="log">> Initializing...</div>

  <script>
    const log = (m) => document.getElementById('log').innerHTML += `<div>> ${m}</div>`;

    // Force an immediate check
    async function start() {
      try {
        log("Checking OBR availability...");
        
        // This is the raw handshake
        OBR.onReady(async () => {
          log("HANDSHAKE COMPLETE.");
          
          await OBR.contextMenu.create({
            id: "com.simple.marker/menu",
            icons: [{
              icon: "https://www.owlbear.rodeo/logo.svg",
              label: "Mark Token",
              filter: { every: [{ key: "type", value: "IMAGE" }] }
            }],
            async onClick(context) {
              const markers = context.items.map(t => OBR.scene.items.buildShape()
                .width(t.width).height(t.height).shapeType("CIRCLE").fillColor("red")
                .position(t.position).attachedTo(t.id).layer("ATTACHMENT").disableHit(true)
                .metadata({ isMarker: true }).build());
              await OBR.scene.items.addItems(markers);
            }
          });
          log("MENU REGISTERED.");
        });
      } catch (e) {
        log("CRITICAL ERROR: " + e.message);
      }
    }

    start();
  </script>
</body>
</html>
