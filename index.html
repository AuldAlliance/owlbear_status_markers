<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@owlbear-rodeo/sdk"></script>
    <style>
        html { background: transparent !important; }
        body { 
            background: rgba(30, 30, 35, 0.95) !important; backdrop-filter: blur(10px);
            color: white; font-family: sans-serif; padding: 15px; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;
        }
        .header { display: flex; align-items: center; gap: 10px; padding-bottom: 10px; border-bottom: 1px solid #444; margin-bottom: 15px; }
        #status { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; }
        .token-name { color: #2196F3; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { 
            cursor: pointer; border-radius: 4px; border: 1px solid #444; background: #2a2a2a;
            color: white; padding: 12px 5px; font-size: 10px; font-weight: bold; text-transform: uppercase;
        }
        button.active { background: #2196F3; border-color: #64b5f6; color: white; box-shadow: 0 0 10px rgba(33,150,243,0.4); }
        #tokenThumb { width: 28px; height: 28px; border-radius: 4px; border: 1px solid #555; object-fit: cover; }
    </style>
</head>
<body>
    <div class="header">
        <img id="tokenThumb" style="display:none">
        <div id="status">Select a Token</div>
    </div>
    <div class="grid">
        <button id="btn-BLN" onclick="window.toggle('BLN', '#ff4444')">Blinded</button>
        <button id="btn-POI" onclick="window.toggle('POI', '#00ff88')">Poisoned</button>
        <button id="btn-PRN" onclick="window.toggle('PRN', '#ffcc00')">Prone</button>
        <button id="btn-FRI" onclick="window.toggle('FRI', '#bb66ff')">Fear</button>
        <button id="btn-FIR" onclick="window.toggle('FIR', '#ff8800')">Fire</button>
        <button id="btn-STU" onclick="window.toggle('STU', '#00ccff')">Stunned</button>
    </div>

<script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@latest/+esm";
    
    const ID = "com.auldalliance.quadrant-status";
    const STORAGE_KEY = `${ID}_last_id`;

    window.toggle = async (code, color) => {
        const tokenId = localStorage.getItem(STORAGE_KEY);
        if (!tokenId) return;

        await OBR.scene.items.updateItems([tokenId], (items) => {
            for (let item of items) {
                let meta = item.metadata[ID] || { conditions: [] };
                const idx = meta.conditions.findIndex(c => c.code === code);
                if (idx > -1) meta.conditions.splice(idx, 1);
                else if (meta.conditions.length < 4) meta.conditions.push({ code, color });
                item.metadata[ID] = meta;
            }
        });
    };

    async function syncMap(items) {
        const allMyLabels = items.filter(i => i.metadata[ID]?.isLabel);
        const tokensWithConditions = items.filter(i => i.metadata[ID]?.conditions?.length > 0);
        
        const desiredLabels = [];
        
        for (const token of tokensWithConditions) {
            const conds = token.metadata[ID].conditions;
            // Get current dimensions
            const w = (token.image?.width || 150) * (token.scale?.x || 1);
            const h = (token.image?.height || 150) * (token.scale?.y || 1);

            const offsets = [
                { x: -w/3, y: -h/3, rot: -45 },
                { x: w/3,  y: -h/3, rot: 45 },
                { x: -w/3, y: h/3,  rot: -135 },
                { x: w/3,  y: h/3,  rot: 135 }
            ];

            conds.forEach((c, i) => {
                const off = offsets[i];
                const labelId = `${token.id}-${c.code}`;
                
                const label = OBR.buildText()
                    .id(labelId)
                    .plainText(c.code)
                    .fontSize(w / 7)
                    .fontWeight(800)
                    .fillColor(c.color)
                    .strokeColor("black")
                    .strokeWidth(2)
                    .position({ x: token.position.x + off.x, y: token.position.y + off.y })
                    .rotation(off.rot + (token.rotation || 0))
                    .attachedTo(token.id)
                    .layer("ATTACHMENT")
                    .disableHit(true)
                    .locked(true)
                    .metadata({ [ID]: { isLabel: true } })
                    .build();
                
                desiredLabels.push(label);
            });
        }

        // 1. Delete labels that are no longer in metadata
        const toDelete = allMyLabels.filter(al => !desiredLabels.some(dl => dl.id === al.id));
        if (toDelete.length > 0) await OBR.scene.items.deleteItems(toDelete.map(l => l.id));

        // 2. Add or Update the labels
        // We use a separate update call for existing ones to ensure they MOVE with the token
        const toAdd = desiredLabels.filter(dl => !allMyLabels.some(al => al.id === dl.id));
        const toUpdate = desiredLabels.filter(dl => allMyLabels.some(al => al.id === dl.id));

        if (toAdd.length > 0) await OBR.scene.items.addItems(toAdd);
        
        if (toUpdate.length > 0) {
            await OBR.scene.items.updateItems(toUpdate.map(l => l.id), (items) => {
                items.forEach(item => {
                    const latest = toUpdate.find(u => u.id === item.id);
                    item.position = latest.position;
                    item.rotation = latest.rotation;
                    item.text.plainText = latest.text.plainText;
                });
            });
        }
    }

    async function syncUI(selection) {
        const id = selection?.[0] || localStorage.getItem(STORAGE_KEY);
        const status = document.getElementById('status');
        const thumb = document.getElementById('tokenThumb');

        if (!id) {
            status.innerText = "Select a Token";
            thumb.style.display = "none";
            return;
        }

        const items = await OBR.scene.items.getItems([id]);
        const token = items[0];
        if (token) {
            localStorage.setItem(STORAGE_KEY, id);
            status.innerHTML = `Editing: <span class="token-name">${(token.name || "Token").toUpperCase()}</span>`;
            if (token.image?.url) { thumb.src = token.image.url; thumb.style.display = "block"; }

            const meta = token.metadata[ID] || { conditions: [] };
            document.querySelectorAll('button').forEach(btn => {
                const code = btn.id.split('-')[1];
                btn.classList.toggle('active', meta.conditions.some(c => c.code === code));
            });
        }
    }

    OBR.onReady(async () => {
        OBR.player.onChange(p => syncUI(p.selection));
        OBR.scene.items.onChange(items => {
            syncMap(items);
            syncUI(await OBR.player.getSelection());
        });
        syncUI(await OBR.player.getSelection());
    });
</script>
</body>
</html>
